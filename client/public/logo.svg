<svg width="512" height="512" viewBox="0 0 512 512" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Prep2Win logo</title>
  <desc>A dark rounded square with two overlapping upward chevrons in indigo</desc>

  <defs>
    <clipPath id="card-clip">
      <rect x="0" y="0" width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="114" fill="#0D1117"/>

  <g clip-path="url(#card-clip)" opacity="0.06">
    <line x1="0" y1="72" x2="512" y2="72" stroke="white" stroke-width="1"/>
    <line x1="0" y1="144" x2="512" y2="144" stroke="white" stroke-width="1"/>
    <line x1="0" y1="216" x2="512" y2="216" stroke="white" stroke-width="1"/>
    <line x1="0" y1="288" x2="512" y2="288" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="512" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0" y1="432" x2="512" y2="432" stroke="white" stroke-width="1"/>
    <line x1="72" y1="0" x2="72" y2="512" stroke="white" stroke-width="1"/>
    <line x1="144" y1="0" x2="144" y2="512" stroke="white" stroke-width="1"/>
    <line x1="216" y1="0" x2="216" y2="512" stroke="white" stroke-width="1"/>
    <line x1="288" y1="0" x2="288" y2="512" stroke="white" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="512" stroke="white" stroke-width="1"/>
    <line x1="432" y1="0" x2="432" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <ellipse cx="256" cy="256" rx="160" ry="140" fill="rgba(99,102,241,0.18)" clip-path="url(#card-clip)"/>

  <polyline
    points="106,390 256,240 406,390"
    fill="none"
    stroke="#818CF8"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.3"
  />

  <polyline
    points="106,300 256,150 406,300"
    fill="none"
    stroke="#818CF8"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <rect x="0" y="0" width="512" height="512" rx="114" fill="none" stroke="rgba(129,140,248,0.15)" stroke-width="2"/>

</svg>
